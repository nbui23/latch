<svg xmlns="http://www.w3.org/2000/svg" width="560" height="640" viewBox="0 0 560 640">

  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>


  <rect x="0" y="0" width="560" height="640" rx="28" fill="#0e0e0e"/>
  <rect x="0" y="0" width="560" height="76" fill="#111111"/>
  <rect x="20" y="22" width="30" height="30" rx="9" fill="#182133"/>
  <rect x="30" y="30" width="4" height="14" rx="2" fill="#f8fafc"/>
  <rect x="30" y="40" width="12" height="4" rx="2" fill="#f8fafc"/>
  <text x="62" y="36" font-size="20" font-weight="700" fill="#e5e5e5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Latch</text>
  <text x="62" y="54" font-size="12" fill="#666666" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Free, open-source macOS focus blocker</text>
  <rect x="0" y="76" width="560" height="46" fill="#1a1a1a"/>

  <text x="22" y="104" font-size="14" font-weight="400" fill="#666666" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Focus</text>
  <rect x="20" y="112" width="74" height="2" rx="1" fill="transparent"/>
  <text x="132" y="104" font-size="14" font-weight="400" fill="#666666" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Block List</text>
  <rect x="130" y="112" width="74" height="2" rx="1" fill="transparent"/>
  <text x="242" y="104" font-size="14" font-weight="600" fill="#e5e5e5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Setup</text>
  <rect x="240" y="112" width="74" height="2" rx="1" fill="#3b82f6"/>
  <rect x="20" y="144" width="520" height="150" rx="12" fill="url(#panel)" stroke="#2c2c2c"/>
  <text x="36" y="174" font-size="18" font-weight="600" fill="#e5e5e5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">App Settings</text>
  <text x="36" y="198" font-size="13" fill="#666666" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Choose how Latch stays accessible when the main window is closed.</text>
  <rect x="36" y="222" width="16" height="16" rx="3" fill="#2563eb"/>
  <path d="M40 230l3 3 6-8" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="64" y="235" font-size="14" font-weight="600" fill="#e5e5e5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Show menu bar icon</text>
  <text x="64" y="254" font-size="12" fill="#888888" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Keeps Latch accessible from the macOS menu bar.</text>
  <rect x="36" y="268" width="16" height="16" rx="3" fill="#151515" stroke="#2c2c2c"/>
  <text x="64" y="281" font-size="14" font-weight="600" fill="#e5e5e5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Keep Dock icon visible with menu bar icon</text>
  <text x="64" y="300" font-size="12" fill="#888888" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Useful if you want both a permanent Dock icon and menu bar access.</text>
  <text x="20" y="342" font-size="18" font-weight="600" fill="#e5e5e5" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Browser Extension Setup</text>
  <text x="20" y="366" font-size="13" fill="#666666" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Install the Chromium extension to get friendlier blocked pages.</text>
  <rect x="20" y="392" width="520" height="44" rx="8" fill="#0f2318" stroke="#166534"/>
  <text x="36" y="419" font-size="13" fill="#4ade80" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Works in Chrome, Microsoft Edge, Brave, and other Chromium browsers.</text>
</svg>